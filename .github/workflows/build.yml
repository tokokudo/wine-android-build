name: Build Wine Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            git \
            wget \
            unzip \
            zip \
            openjdk-11-jdk \
            ruby \
            patch

      - name: Show Ruby version
        run: ruby -v

      - name: Make script executable
        run: chmod +x make

      - name: Run Wine Android build
        run: |
          ./make \
            -h wine-9.0 \
            -w 9.0 \
            --tools \
            --nativewine \
            --dlfreetype \
            --freetype \
            --androidwine \
            --crimes

      - name: Zip output
        run: |
          mkdir output
          cp *.apk output/ || true
          zip -r wine-android-build.zip output/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: wine-android-build
          path: wine-android-build.zip
